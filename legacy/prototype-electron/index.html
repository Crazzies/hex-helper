<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HexHelper Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: "Microsoft YaHei", sans-serif;
            background: rgba(0, 0, 0, 0.7); /* 半透明深色背景 */
            color: #fff;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }
        .header {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00d2ff;
            text-align: center;
        }
        .bench-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }
        .hero-name {
            font-size: 12px;
            flex-grow: 1;
        }
        .win-rate {
            font-size: 14px;
            font-weight: bold;
            color: #ffca28;
        }
        .win-bar {
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .win-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
        }
        .build-section {
            display: none; /* 默认隐藏，进入游戏才显示 */
        }
        .build-title {
            font-size: 12px;
            margin-top: 10px;
            color: #9e9e9e;
        }
        .tag {
            display: inline-block;
            padding: 2px 6px;
            background: #333;
            border-radius: 4px;
            font-size: 11px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header" id="status-text">HexHelper 准备就绪</div>
        
        <!-- 选人模式：板凳席 -->
        <div id="bench-list">
            <!-- 英雄列表将在这里动态生成 -->
        </div>

        <!-- 游戏模式：推荐 -->
        <div id="build-view" class="build-section">
            <div class="build-title">核心出装</div>
            <div id="items-list"></div>
            <div class="build-title">推荐海克斯</div>
            <div id="hex-list"></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // 更新状态文字
        ipcRenderer.on('status', (event, text) => {
            document.getElementById('status-text').innerText = text;
        });

        // 监听带真实数据的更新
        ipcRenderer.on('update-bench-detailed', (event, heroes) => {
            const list = document.getElementById('bench-list');
            list.innerHTML = '';
            document.getElementById('build-view').style.display = 'none';

            heroes.forEach(h => {
                const item = document.createElement('div');
                item.className = 'bench-item';
                item.innerHTML = `
                    <div style="flex-direction: column; width: 100%">
                        <div style="display: flex; justify-content: space-between">
                            <span class="hero-name">${h.name}</span>
                            <span class="win-rate">${h.winRate}</span>
                        </div>
                        <div class="win-bar"><div class="win-bar-fill" style="width: ${h.winRate}"></div></div>
                    </div>
                `;
                list.appendChild(item);
            });
        });

        // 监听游戏内出装推荐
        ipcRenderer.on('update-game-build', (event, build) => {
            document.getElementById('bench-list').innerHTML = '';
            const buildView = document.getElementById('build-view');
            buildView.style.display = 'block';

            const itemsList = document.getElementById('items-list');
            itemsList.innerHTML = build.items.map(i => `<span class="tag">${i}</span>`).join('');

            const hexList = document.getElementById('hex-list');
            hexList.innerHTML = build.hextech.map(h => `<span class="tag" style="background: #1a237e">${h}</span>`).join('');
        });
    </script>
</body>
</html>
