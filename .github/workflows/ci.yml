name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax Check
        run: find src -type f -name "*.js" -print0 | xargs -0 -n1 node --check

  package-win-portable:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Windows Portable EXE
        run: npm run build:win:linux
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexHelper-windows-portable
          path: dist/HexHelper.exe
          if-no-files-found: error
